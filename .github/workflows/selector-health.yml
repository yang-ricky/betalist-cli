name: Selector Health Check

on:
  schedule:
    - cron: '0 8 * * *'  # Daily at 8:00 UTC
  workflow_dispatch:  # Allow manual trigger

jobs:
  check-selectors:
    name: Check Selectors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install -g npm@11.5.1
      - run: npm ci
      - run: npm run build

      - name: Run selector health check
        id: health-check
        continue-on-error: true
        run: |
          npm run selector:health 2>&1 | tee health-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Create issue if selectors broken
        if: steps.health-check.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('health-output.txt', 'utf8');
            
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'selector-broken'
            });
            
            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '🚨 Selector health check failed',
                body: `## Selector Health Check Failed\n\nThe daily selector health check has detected issues.\n\n### Output\n\`\`\`\n${output}\n\`\`\`\n\n### Next Steps\n1. Check if BetaList has updated their HTML structure\n2. Update selectors in \`src/selectors.ts\`\n3. Update test fixtures if needed`,
                labels: ['selector-broken', 'automated']
              });
            }
